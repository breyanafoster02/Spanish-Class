<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godmommy's Spanish Class</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f172a;
  --indigo: #1e293b;
  --card: #1e293b;
  --border: rgba(255,255,255,0.08);
  --teal: #2dd4bf;
  --yellow: #fbbf24;
  --coral: #f87171;
  --purple: #a78bfa;
  --green: #34d399;
  --white: #f8fafc;
  --muted: rgba(248,250,252,0.5);
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden;}

/* ── TOP BAR ── */
#topbar{background:var(--indigo);border-bottom:1px solid var(--border);padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
#topbar-left{display:flex;align-items:center;gap:0.6rem;}
#topbar-title{font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:800;color:var(--yellow);}
#topbar-sub{font-size:0.72rem;color:var(--muted);font-weight:600;}
#mode-toggle{display:flex;gap:0.35rem;}
.mode-btn{padding:0.35rem 0.85rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
.mode-btn.active{background:var(--teal);border-color:var(--teal);color:var(--navy);}

/* ── MONTH STRIP ── */
#month-strip{display:flex;overflow-x:auto;gap:0.4rem;padding:0.75rem 1.25rem;background:var(--navy);border-bottom:1px solid var(--border);scrollbar-width:none;}
#month-strip::-webkit-scrollbar{display:none;}
.m-tab{flex-shrink:0;padding:0.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.m-tab:hover{border-color:var(--teal);color:var(--teal);}
.m-tab.active{background:var(--teal);border-color:var(--teal);color:var(--navy);}

/* ── WEEK NAV ── */
#week-nav{display:flex;gap:0.4rem;padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);}
.w-btn{padding:0.35rem 0.9rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.78rem;cursor:pointer;transition:all 0.2s;}
.w-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.w-btn.active{background:var(--yellow);border-color:var(--yellow);color:var(--navy);}

/* ── DAY TABS ── */
#day-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);}
.d-tab{flex:1;padding:0.65rem;text-align:center;border:none;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.8rem;cursor:pointer;transition:all 0.2s;border-bottom:3px solid transparent;}
.d-tab:hover{color:var(--white);}
.d-tab.active{color:var(--white);border-bottom-color:var(--coral);}
.d-tab.mon.active{border-bottom-color:var(--teal);}
.d-tab.wed.active{border-bottom-color:var(--purple);}
.d-tab.ind.active{border-bottom-color:var(--green);}

/* ── MAIN ── */
main{max-width:680px;margin:0 auto;padding:1.25rem;}

/* ── SESSION BLOCK ── */
.session-block{margin-bottom:1.25rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.sb-header{padding:0.85rem 1.1rem;display:flex;align-items:center;gap:0.6rem;cursor:pointer;user-select:none;border-bottom:1px solid transparent;}
.sb-header:hover{filter:brightness(1.08);}
.sb-time{font-size:0.7rem;font-weight:800;padding:0.2rem 0.55rem;border-radius:10px;opacity:0.9;white-space:nowrap;}
.sb-title{font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:700;flex:1;}
.sb-arrow{font-size:0.9rem;color:var(--muted);transition:transform 0.3s;}
.sb-arrow.open{transform:rotate(180deg);}
.sb-body{padding:1.1rem;display:none;}
.sb-body.open{display:block;}

.block-warmup .sb-header{background:linear-gradient(135deg,#1e3a5f,#1e293b);}
.block-warmup .sb-time{background:#3b82f6;color:white;}
.block-content .sb-header{background:linear-gradient(135deg,#1a3a2e,#1e293b);}
.block-content .sb-time{background:var(--teal);color:var(--navy);}
.block-practice .sb-header{background:linear-gradient(135deg,#3a1a3a,#1e293b);}
.block-practice .sb-time{background:var(--purple);color:white;}
.block-wrapup .sb-header{background:linear-gradient(135deg,#3a2a1a,#1e293b);}
.block-wrapup .sb-time{background:var(--yellow);color:var(--navy);}

/* ── VOCAB TABLE ── */
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;}
.vocab-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:0.6rem 0.75rem;}
.vc-es{font-weight:800;font-size:0.88rem;color:var(--white);}
.vc-pron{font-size:0.7rem;color:var(--muted);font-style:italic;margin:1px 0;}
.vc-en{font-size:0.78rem;color:var(--teal);font-weight:600;}
@media(max-width:480px){.vocab-grid{grid-template-columns:1fr;}}

/* ── GRAMMAR BOX ── */
.grammar-pill{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);border-radius:12px;padding:0.9rem;margin-bottom:0.7rem;}
.grammar-pill h4{font-size:0.82rem;font-weight:800;color:var(--purple);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px;}
.ex-sentence{background:rgba(255,255,255,0.04);border-radius:8px;padding:0.5rem 0.7rem;margin:0.3rem 0;font-size:0.85rem;}
.ex-es{font-weight:700;color:var(--white);}
.ex-en{font-size:0.78rem;color:var(--muted);font-style:italic;}
.grammar-tip{background:rgba(251,191,36,0.08);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;padding:0.6rem 0.8rem;margin-top:0.6rem;font-size:0.82rem;color:rgba(255,255,255,0.8);line-height:1.5;}

/* ── ACTIVITY CARDS ── */
.activity-list{display:flex;flex-direction:column;gap:0.5rem;}
.act-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:0.75rem 0.9rem;}
.act-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;}
.act-emoji{font-size:1.1rem;}
.act-title{font-weight:800;font-size:0.85rem;}
.act-desc{font-size:0.8rem;color:rgba(255,255,255,0.65);line-height:1.5;}

/* ── TUTOR NOTES ── */
.tutor-notes{background:rgba(45,212,191,0.06);border:1px solid rgba(45,212,191,0.2);border-radius:10px;padding:0.8rem;margin-top:0.8rem;}
.tutor-notes h5{font-size:0.75rem;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.5rem;}
.tutor-notes li{font-size:0.8rem;color:rgba(255,255,255,0.7);margin-left:1rem;margin-bottom:0.25rem;line-height:1.4;}

/* ── CHALLENGE ── */
.challenge-box{background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(248,113,113,0.1));border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:1rem;}
.challenge-box h4{font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:700;color:var(--yellow);margin-bottom:0.5rem;}
.challenge-box p{font-size:0.85rem;color:rgba(255,255,255,0.75);line-height:1.5;}
.challenge-prompt{background:rgba(255,255,255,0.05);border-radius:8px;padding:0.6rem;margin-top:0.5rem;font-size:0.9rem;font-weight:700;font-style:italic;color:var(--white);}

/* ── INDEPENDENT DAY ── */
.ind-section{margin-bottom:1.25rem;}
.ind-section-title{font-family:'Baloo 2',sans-serif;font-size:0.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.4rem;}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.timer-badge{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);border-radius:20px;padding:0.2rem 0.6rem;font-size:0.72rem;font-weight:700;color:var(--green);margin-bottom:0.5rem;}

/* ── WORKBOOK ── */
.workbook-card{background:var(--indigo);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;}
.wb-instruction{font-size:0.8rem;color:var(--muted);margin-bottom:0.8rem;font-style:italic;}
.wb-item{margin-bottom:0.9rem;}
.wb-label{font-size:0.82rem;font-weight:700;color:var(--white);margin-bottom:0.25rem;}
.wb-label span{color:var(--muted);font-weight:400;}
.wb-input{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:8px;padding:0.5rem 0.7rem;color:var(--white);font-family:'Nunito',sans-serif;font-size:0.85rem;transition:border-color 0.2s;outline:none;}
.wb-input:focus{border-color:var(--teal);}
.wb-word-bank{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.6rem;}
.wb-chip{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:20px;padding:0.2rem 0.65rem;font-size:0.75rem;font-weight:700;color:var(--yellow);cursor:pointer;transition:all 0.2s;}
.wb-chip:hover{background:rgba(251,191,36,0.2);}
.wb-chip.used{opacity:0.35;text-decoration:line-through;cursor:default;}
.wb-actions{display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap;}
.wb-btn{padding:0.45rem 1.1rem;border-radius:20px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.8rem;cursor:pointer;transition:all 0.2s;}
.wb-btn.check{background:var(--green);color:var(--navy);}
.wb-btn.clear{background:rgba(255,255,255,0.08);color:var(--white);}
.wb-btn.print{background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:var(--coral);}
.wb-btn:hover{opacity:0.85;transform:translateY(-1px);}
.wb-result{margin-top:0.7rem;padding:0.6rem 0.8rem;border-radius:8px;font-size:0.82rem;font-weight:700;display:none;}
.wb-result.show{display:block;}
.wb-result.good{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--green);}
.wb-result.bad{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--coral);}

/* ── GAMES ── */
.game-launcher{display:flex;gap:0.5rem;flex-wrap:wrap;}
.gl-btn{flex:1;min-width:90px;padding:0.7rem 0.5rem;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,0.03);color:var(--white);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.8rem;cursor:pointer;text-align:center;transition:all 0.2s;}
.gl-btn:hover{transform:translateY(-2px);}
.gl-btn .gl-emoji{font-size:1.4rem;display:block;margin-bottom:0.2rem;}
.gl-btn.fc{border-color:rgba(45,212,191,0.4);}
.gl-btn.fc:hover{background:rgba(45,212,191,0.1);}
.gl-btn.qz{border-color:rgba(167,139,250,0.4);}
.gl-btn.qz:hover{background:rgba(167,139,250,0.1);}
.gl-btn.mt{border-color:rgba(251,191,36,0.4);}
.gl-btn.mt:hover{background:rgba(251,191,36,0.1);}

/* ── GAME MODAL ── */
#gmodal{display:none;position:fixed;inset:0;z-index:900;}
#gm-back{position:absolute;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);}
#gm-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(96vw,520px);max-height:88vh;overflow-y:auto;
  background:#1e293b;border:1.5px solid var(--teal);border-radius:20px;padding:1.4rem;}
#gm-close-btn{position:absolute;top:0.9rem;right:0.9rem;background:rgba(255,255,255,0.08);
  border:none;color:var(--white);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;line-height:30px;text-align:center;}
.gm-h{font-family:'Baloo 2',sans-serif;font-size:1.3rem;font-weight:800;color:var(--yellow);margin-bottom:0.2rem;}
.gm-sh{font-size:0.78rem;color:var(--teal);font-weight:600;margin-bottom:1.1rem;}

/* flashcard */
#fc-wrap{perspective:900px;width:100%;height:180px;cursor:pointer;margin:0.8rem 0;}
#fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s;}
#fc-inner.flip{transform:rotateY(180deg);}
.fc-side{position:absolute;inset:0;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;padding:1.2rem;text-align:center;}
.fc-front{background:linear-gradient(135deg,#0f2744,#1e293b);border:1.5px solid var(--teal);}
.fc-back{background:linear-gradient(135deg,#0a3328,#1e293b);transform:rotateY(180deg);border:1.5px solid var(--green);}
.fc-lbl{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:0.5;margin-bottom:0.4rem;}
.fc-word{font-family:'Baloo 2',sans-serif;font-size:1.5rem;font-weight:800;}
.fc-sub{font-size:0.75rem;opacity:0.5;margin-top:0.25rem;}
.fc-hint{text-align:center;font-size:0.72rem;color:var(--muted);margin-bottom:0.3rem;}
.fc-prog{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:0.6rem;}
.fc-prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.3s;}
.fc-ctrl{display:flex;justify-content:space-between;align-items:center;gap:0.4rem;}
.fc-nav{padding:0.4rem 1rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;}
.fc-nav:hover{border-color:var(--teal);}
.fc-count{font-size:0.8rem;color:var(--teal);font-weight:800;}

/* quiz */
.quiz-q{background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:12px;padding:1rem;text-align:center;font-family:'Baloo 2',sans-serif;font-size:1.3rem;font-weight:700;margin:0.6rem 0;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;margin-bottom:0.6rem;}
.quiz-o{padding:0.6rem 0.75rem;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,0.04);color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;text-align:left;transition:all 0.2s;}
.quiz-o:hover:not(.done){border-color:var(--yellow);background:rgba(251,191,36,0.08);}
.quiz-o.correct{background:rgba(52,211,153,0.15);border-color:var(--green);color:var(--green);}
.quiz-o.wrong{background:rgba(248,113,113,0.15);border-color:var(--coral);color:var(--coral);}
.quiz-o.done{cursor:default;}
.quiz-fb{min-height:24px;text-align:center;font-weight:800;font-size:0.88rem;margin-bottom:0.4rem;}
.quiz-bar{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--teal);font-weight:700;background:rgba(255,255,255,0.04);border-radius:8px;padding:0.4rem 0.7rem;}
.quiz-next{display:none;margin:0.6rem auto 0;padding:0.5rem 1.8rem;border-radius:20px;background:var(--yellow);border:none;color:var(--navy);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;cursor:pointer;}

/* match */
.match-info{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--teal);font-weight:700;margin-bottom:0.6rem;}
#match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;}
@media(max-width:400px){#match-grid{grid-template-columns:repeat(3,1fr);}}
.mt-tile{padding:0.45rem 0.2rem;min-height:50px;border-radius:9px;border:1.5px solid var(--border);background:rgba(255,255,255,0.04);color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.72rem;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;transition:all 0.2s;line-height:1.2;}
.mt-tile:hover:not(.mt-solved):not(.mt-sel){border-color:var(--yellow);background:rgba(251,191,36,0.08);}
.mt-tile.mt-sel{border-color:var(--teal);background:rgba(45,212,191,0.12);}
.mt-tile.mt-solved{background:rgba(52,211,153,0.12);border-color:var(--green);color:var(--green);cursor:default;opacity:0.7;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.mt-tile.mt-shake{animation:shake 0.35s;}

/* complete screen */
.gm-done{text-align:center;padding:1.5rem 0.5rem;}
.gm-done .trophy{font-size:3rem;margin-bottom:0.5rem;}
.gm-done h3{font-family:'Baloo 2',sans-serif;font-size:1.4rem;color:var(--yellow);margin-bottom:0.3rem;}
.gm-done p{font-size:0.85rem;color:var(--muted);margin-bottom:1rem;}
.gm-done-btns{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;}
.gm-again{padding:0.5rem 1.4rem;border-radius:20px;background:var(--teal);border:none;color:var(--navy);font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;}
.gm-other{padding:0.5rem 1.4rem;border-radius:20px;background:rgba(255,255,255,0.08);border:none;color:var(--white);font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;}

/* ── MONTH HEADER ── */
.month-hero{border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.mh-bg{position:absolute;inset:0;opacity:0.08;font-size:8rem;display:flex;align-items:center;justify-content:flex-end;padding-right:1rem;pointer-events:none;}
.mh-label{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:0.7;margin-bottom:0.2rem;}
.mh-title{font-family:'Baloo 2',sans-serif;font-size:1.6rem;font-weight:800;line-height:1.1;}
.mh-sub{font-size:0.82rem;opacity:0.75;margin-top:0.25rem;}
.mh-tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.6rem;}
.mh-tag{padding:0.2rem 0.6rem;border-radius:20px;font-size:0.7rem;font-weight:700;background:rgba(255,255,255,0.15);}
.mh-may{background:linear-gradient(135deg,#064e3b,#065f46);}
.mh-jun{background:linear-gradient(135deg,#78350f,#92400e);}
.mh-jul{background:linear-gradient(135deg,#7f1d1d,#991b1b);}
.mh-aug{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);}
.mh-sep{background:linear-gradient(135deg,#4c1d95,#6d28d9);}
.mh-oct{background:linear-gradient(135deg,#7c2d12,#c2410c);}
.mh-nov{background:linear-gradient(135deg,#374151,#4b5563);}
.mh-dec{background:linear-gradient(135deg,#0f172a,#1e3a8a);}

/* ── PRINT ── */
@media print {
  #topbar,#month-strip,#week-nav,#day-tabs,.game-launcher,.wb-actions,.gl-btn,#gmodal{display:none!important;}
  body{background:white;color:black;}
  .wb-input{border:1px solid #ccc;background:white;color:black;}
  .workbook-card{background:white;border:1px solid #ddd;}
  .wb-chip{background:#f0f0f0;color:#333;border-color:#ccc;}
  main{max-width:100%;padding:0;}
  .sb-body{display:block!important;}
}

/* ── AUTH SCREEN ── */
#auth-screen{position:fixed;inset:0;z-index:1000;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{width:min(96vw,400px);background:var(--indigo);border:1px solid var(--border);border-radius:24px;padding:2rem;text-align:center;}
.auth-logo{font-size:3rem;margin-bottom:0.4rem;}
.auth-title{font-family:'Baloo 2',sans-serif;font-size:1.5rem;font-weight:800;color:var(--yellow);margin-bottom:0.2rem;}
.auth-sub{font-size:0.8rem;color:var(--muted);margin-bottom:1.4rem;}
.role-btns{display:flex;flex-direction:column;gap:0.55rem;}

.pd-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:0.84rem;line-height:1.6;}

.wp-sname{font-weight:800;font-size:0.86rem;}
.wp-stime{font-size:0.68rem;color:var(--muted);white-space:nowrap;}

.wp-q{font-size:0.75rem;color:var(--muted);}

.wp-a.no{color:var(--coral);border-left:2px solid var(--coral);}
.wp-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:0.84rem;line-height:1.6;}

#tb-extras{display:none;align-items:center;gap:0.4rem;}

#signout-btn{padding:0.32rem 0.7rem;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.7rem;cursor:pointer;}

/* hide main until authed */
#app-shell{display:none;}


/* ── INLINE FLIP CARDS ── */
.ifc-wrap{margin-bottom:1rem;}
.ifc-stage{perspective:900px;width:100%;height:128px;cursor:pointer;margin-bottom:0.4rem;}
.ifc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.38s cubic-bezier(.4,0,.2,1);}
.ifc-card.flipped{transform:rotateY(180deg);}
.ifc-face{position:absolute;inset:0;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;padding:0.9rem;text-align:center;gap:0.2rem;}

.ifc-back{background:linear-gradient(135deg,#064e3b,#1e293b);border:1.5px solid rgba(45,212,191,0.45);transform:rotateY(180deg);}
.ifc-lang{font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;opacity:0.4;}
.ifc-word{font-family:'Baloo 2',sans-serif;font-size:1.35rem;font-weight:800;line-height:1.15;}
.ifc-pron{font-size:0.65rem;color:var(--muted);font-style:italic;}
.ifc-controls{display:flex;align-items:center;gap:0;}
.ifc-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:rgba(255,255,255,0.04);color:var(--white);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}

.ifc-prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width 0.3s;}
.ifc-divider{border:none;border-top:1px solid var(--border);margin:0.85rem 0 0.65rem;}

  nov:{label:"Noviembre / November",emoji:"🦃",theme:"Gratitude & Future Dreams",color:"mh-nov",tags:["🙏 Gratitude","🔮 Future","💭 Dreams"],weeks:Array(4).fill(null).map((_,i)=>({mon:{vocab:[[{es:"gracias",pr:"GRAH-syahs",en:"thank you"},{es:"estoy agradecido/a",pr:"ehs-TOY ah-grah-deh-SEE-doh",en:"I am grateful"},{es:"quiero",pr:"KYEH-roh",en:"I want"},{es:"quiero ser",pr:"KYEH-roh sehr",en:"I want to be"},{es:"quiero ir",pr:"KYEH-roh eer",en:"I want to go"},{es:"el sueño",pr:"el SWEH-nyoh",en:"dream"},{es:"el futuro",pr:"el foo-TOO-roh",en:"the future"},{es:"algún día",pr:"ahl-GOON DEE-ah",en:"someday"},{es:"la esperanza",pr:"lah ehs-peh-RAHN-sah",en:"hope"},{es:"aprender",pr:"ah-prehn-DEHR",en:"to learn"}],[{es:"ayudar",pr:"ah-yoo-DAHR",en:"to help"},{es:"compartir",pr:"kohm-pahr-TEER",en:"to share"},{es:"la bondad",pr:"lah bohn-DAHD",en:"kindness"},{es:"la gratitud",pr:"lah grah-tee-TOOD",en:"gratitude"},{es:"dar las gracias",pr:"dahr lahs GRAH-syahs",en:"to give thanks"},{es:"porque",pr:"POR-keh",en:"because"},{es:"importante",pr:"eem-pohr-TAHN-teh",en:"important"},{es:"la familia importa",pr:"",en:"family matters"},{es:"el corazón",pr:"el koh-rah-SOHN",en:"heart"},{es:"con todo mi corazón",pr:"",en:"with all my heart"}],[{es:"crecer",pr:"kreh-SEHR",en:"to grow"},{es:"el año que viene",pr:"el AHN-yoh keh BYEH-neh",en:"next year"},{es:"voy a ser",pr:"BOY ah sehr",en:"I am going to be"},{es:"voy a aprender",pr:"BOY ah ah-prehn-DEHR",en:"I am going to learn"},{es:"voy a ayudar",pr:"BOY ah ah-yoo-DAHR",en:"I am going to help"},{es:"cuando sea mayor",pr:"KWAHN-doh SEH-ah mah-YOHR",en:"when I grow up"},{es:"el trabajo",pr:"el trah-BAH-hoh",en:"work / job"},{es:"el éxito",pr:"el EHK-see-toh",en:"success"},{es:"esforzarse",pr:"ehs-fohr-SAR-seh",en:"to work hard / strive"},{es:"el logro",pr:"el LOH-groh",en:"achievement / accomplishment"}],[{es:"el año pasado",pr:"el AHN-yoh pah-SAH-doh",en:"last year"},{es:"este año",pr:"EHS-teh AHN-yoh",en:"this year"},{es:"el año que viene",pr:"",en:"next year"},{es:"aprendí",pr:"ah-prehn-DEE",en:"I learned"},{es:"mejoré",pr:"meh-hoh-REH",en:"I improved"},{es:"logré",pr:"loh-GREH",en:"I achieved"},{es:"estoy orgulloso/a",pr:"",en:"I am proud"},{es:"quiero mejorar",pr:"",en:"I want to improve"},{es:"¡Lo hiciste!",pr:"loh ee-SEES-teh",en:"You did it!"},{es:"¡Felicidades!",pr:"feh-lee-see-DAH-dehs",en:"Congratulations!"}]][i],grammar:{title:["Gratitude — Estoy agradecido/a por...","Kindness & Values in Spanish","Future with 'Voy a'","Year in Review — Past Tense Intro"][i],rule:["Use <b>estoy agradecido/a por + noun</b> OR <b>estoy agradecido/a de + infinitive</b>.","Use 'dar las gracias' and 'ayudar' to talk about showing kindness.","Use <b>voy a + infinitive</b> to express future intentions and goals.","Introduce past tense lightly: 'aprendí' (I learned), 'mejoré' (I improved)."][i],examples:[[{es:"Estoy agradecido por mi familia.",en:"I am grateful for my family."},{es:"Gracias por enseñarme español.",en:"Thank you for teaching me Spanish."},{es:"Estoy agradecido de aprender cosas nuevas.",en:"I am grateful to learn new things."}],[{es:"Me gusta ayudar a los demás.",en:"I like to help others."},{es:"Compartir es muy importante.",en:"Sharing is very important."},{es:"Mi maestra tiene un gran corazón.",en:"My teacher has a big heart."}],[{es:"El año que viene, voy a aprender más español.",en:"Next year, I'm going to learn more Spanish."},{es:"Cuando sea mayor, voy a ser doctor.",en:"When I grow up, I'm going to be a doctor."},{es:"Voy a esforzarme más en las matemáticas.",en:"I'm going to work harder in math."}],[{es:"Este año, aprendí mucho español.",en:"This year, I learned a lot of Spanish."},{es:"¡Logré hablar en español! ¡Felicidades!",en:"I achieved speaking Spanish! Congratulations!"},{es:"El año que viene, quiero mejorar más.",en:"Next year, I want to improve more."}]][i],tip:["🙏 Gratitude vocabulary is deeply personal — take time with it. Don't rush!","❤️ Values conversations in Spanish build both language AND character!","🔮 'Voy a' future is one of the MOST USEFUL structures he'll ever learn.","🏆 Introducing the past tense lightly here sets up future learning beautifully."][i]},activities:[[{emoji:"🙏",title:"Gratitude List",desc:"Write 10 things you're grateful for in Spanish. Start each: 'Estoy agradecido/a por/de...'"},{emoji:"💌",title:"Thank You Letter",desc:"Write a sincere thank-you letter in Spanish to someone important. Use 'gracias por,' 'estoy agradecido/a,' and 'me ayudas cuando...'"},{emoji:"🗣️",title:"Gratitude Sharing Circle",desc:"Take turns sharing one thing you're grateful for. Listen, respond: '¡Qué hermoso!' or '¡Me alegra mucho!'"}],[{emoji:"❤️",title:"Kindness Map",desc:"Draw a map of your week. Mark every moment you showed kindness. Write what you did in Spanish."},{emoji:"📝",title:"Values Paragraph",desc:"Write a 6-sentence paragraph about the most important value in your life. Use 'creo que...' (I believe that...)"},{emoji:"🎭",title:"Kindness Skits",desc:"Act out 3 scenes where someone shows kindness. Narrate in Spanish: 'Él/ella ayuda porque...'"}],[{emoji:"🔮",title:"Dream Board",desc:"Write 5 future goals: 'Voy a ser ___. Voy a aprender ___. Cuando sea mayor, voy a...' Illustrate each one."},{emoji:"📝",title:"Letter to Future Self",desc:"Write a letter to yourself 10 years from now. Tell your future self your dreams in Spanish."},{emoji:"🗣️",title:"Career Day",desc:"'When I grow up...' conversation. Each person describes 3 dream careers using 'Quiero ser' and 'Voy a'"}],[{emoji:"🏆",title:"Year in Review",desc:"Look back at all the months. Write one sentence about what you learned each month: 'En mayo, aprendí...'"},{emoji:"🎉",title:"Achievement Celebration",desc:"Make a list of 10 Spanish things you can now do. Start each: 'Ahora puedo...' (Now I can...)"},{emoji:"📝",title:"November Reflection",desc:"Write a paragraph: what you're grateful for this year, one dream for next year, and one thing you'll always remember."}]][i],challenge:{title:"🏆 Nov Week "+(i+1)+" Challenge",desc:["Write a 10-item gratitude list and read it aloud. Then write a 4-sentence thank-you letter to one person.","Write your personal 'Values Statement' in Spanish — 6 sentences about what matters most to you.","Create a full 'Future Dreams' vision: 5 goals using 'voy a,' 3 career ideas using 'quiero ser,' and 1 big dream for 'cuando sea mayor.'","Year-in-review oral presentation: 2 minutes covering something learned each month, your proudest moment, and your goal for next year."][i],prompt:['"Estoy agradecido/a por ___, ___, y ___. Gracias a mi madrina por enseñarme español con amor..."','"Creo que la bondad es muy importante porque... Yo trato de ayudar cuando... Mi valor más importante es..."','"Voy a ser ___. Voy a aprender ___. Cuando sea mayor, voy a ayudar a ___. Mi sueño más grande es..."','"Este año, aprendí sobre los lugares, el cuerpo, la familia, y mucho más. Estoy orgulloso/a porque... El año que viene, quiero..."'][i]},notes:[[" Gratitude is a powerful emotional anchor — give it real space","The thank-you letter to Godmommy is a potential keepsake","This is a great month for deep, slow conversations in Spanish"],["Values conversations are rare in language learning — they're gold","'Creo que' (I believe that) is a sophisticated structure — introduce it gently","Character building alongside language building = the best teaching"],["Future tense via 'voy a' is immediately empowering","The letter to future self is one of the most meaningful activities of the year","Career dreams are always highly motivating for this age"],["Year-in-review is emotional and powerful","The 'Ahora puedo' list shows real concrete progress — be specific","Final month of Year 1 almost here! Build excitement for December!"]].flat().slice(0,3)},wed:{review:[["gracias","estoy agradecido/a","el sueño","quiero","la esperanza"],["ayudar","compartir","la bondad","porque","el corazón"],["voy a ser","cuando sea mayor","el éxito","crecer","el logro"],["aprendí","mejoré","logré","¡Felicidades!","estoy orgulloso/a"]][i],vocab:[[{es:"¡De nada!",pr:"deh NAH-dah",en:"You're welcome!"},{es:"por favor",pr:"por fah-BOHR",en:"please"},{es:"¡Con mucho gusto!",pr:"kohn MOO-choh GOOS-toh",en:"With pleasure!"},{es:"¡Qué amable!",pr:"keh ah-MAH-bleh",en:"How kind!"},{es:"la gentileza",pr:"lah hehn-tee-LEH-sah",en:"kindness / gentleness"}],[{es:"todos los días",pr:"TOH-dohs lohs DEE-ahs",en:"every day"},{es:"en mi comunidad",pr:"ehn mee koh-moo-nee-DAHD",en:"in my community"},{es:"hacer el bien",pr:"ah-SEHR el byehn",en:"to do good"},{es:"un acto de bondad",pr:"",en:"an act of kindness"},{es:"servir",pr:"sehr-BEER",en:"to serve"}],[{es:"el próximo año",pr:"el PROHK-see-moh AHN-yoh",en:"next year"},{es:"me comprometo",pr:"meh kohm-proh-MEH-toh",en:"I commit to / I promise"},{es:"paso a paso",pr:"PAH-soh ah PAH-soh",en:"step by step"},{es:"nunca me rindo",pr:"NOON-kah meh REEN-doh",en:"I never give up"},{es:"el camino",pr:"el kah-MEE-noh",en:"the journey / path"}],[{es:"¡Buen trabajo!",pr:"bwehn trah-BAH-hoh",en:"Good work!"},{es:"¡Estoy orgulloso/a de ti!",pr:"",en:"I am proud of you!"},{es:"sigue adelante",pr:"SEE-geh ah-deh-LAHN-teh",en:"keep going / move forward"},{es:"el esfuerzo",pr:"el ehs-FWEHR-soh",en:"effort"},{es:"¡Tú puedes!",pr:"too PWEH-dehs",en:"You can do it!"}]][i],grammar:{title:["Week "+(i+1)+" Wed — Courtesy & Thanks","Service & Community Phrases","Making Commitments","Encouragement Phrases"][i],rule:["Practice a full conversation of gratitude and courtesy.","Talk about helping and serving your community using 'servir' and 'hacer el bien.'","Use 'me comprometo a' to make real future commitments.","Use encouraging phrases to support each other in Spanish."][i],examples:[[{es:"¡Gracias por tu ayuda! ¡Con mucho gusto!",en:"Thank you for your help! With pleasure!"},{es:"¡Qué amable eres siempre!",en:"How kind you always are!"},{es:"Por favor, ¿puedes ayudarme?",en:"Please, can you help me?"}],[{es:"Todos los días, trato de hacer el bien.",en:"Every day, I try to do good."},{es:"En mi comunidad, me gusta servir.",en:"In my community, I like to serve."},{es:"Un acto de bondad cambia el día.",en:"An act of kindness changes the day."}],[{es:"Me comprometo a estudiar más este año.",en:"I commit to studying more this year."},{es:"Paso a paso, voy a mejorar mi español.",en:"Step by step, I'm going to improve my Spanish."},{es:"Nunca me rindo. ¡Tú puedes!",en:"I never give up. You can do it!"}],[{es:"¡Buen trabajo hoy! Estoy orgullosa de ti.",en:"Good work today! I am proud of you."},{es:"Sigue adelante — estás mejorando mucho.",en:"Keep going — you are improving a lot."},{es:"El esfuerzo que pones es increíble.",en:"The effort you put in is incredible."}]][i],tip:["😊 Courtesy phrases make language BEAUTIFUL — they show cultural depth beyond just vocabulary!","🌍 Community and service language is advanced for 10 — be proud of how far he's come!","💪 Making commitments in Spanish connects language to character and real life!","🌟 End every November session with encouragement phrases — mean every word of it!"][i]},activities:[[{emoji:"🤝",title:"Courtesy Conversation",desc:"Full Q&A exchange using only courtesy phrases: gracias, de nada, con mucho gusto, por favor, ¡qué amable!"},{emoji:"📝",title:"Thank You Card Collection",desc:"Write 3 thank-you cards in Spanish — one to a family member, one to a teacher, one to a friend."}],[{emoji:"🌍",title:"Community Helper Presentation",desc:"Name 5 community helpers (el médico, el bombero, etc.). Write 2 sentences about what each one does to help."},{emoji:"💌",title:"Act of Kindness Report",desc:"Report on an act of kindness from this week: who, what, where, when, and why — all in Spanish."}],[{emoji:"📜",title:"My Spanish Commitments",desc:"Write 5 'me comprometo a' sentences — real promises you're making to yourself for next year."},{emoji:"🎯",title:"Step by Step Goal Plan",desc:"Choose one goal. Break it into 5 steps. Write each step i   dec:{label:"Diciembre / December",emoji:"🎄",theme:"Christmas, Las Posadas & Year 1 Celebration",color:"mh-dec",tags:["🎄 Christmas","🕯️ Las Posadas","🏆 Year 1 Complete"],weeks:Array(4).fill(null).map((_,i)=>({mon:{vocab:[[{es:"la Navidad",pr:"lah nah-bee-DAHD",en:"Christmas"},{es:"¡Feliz Navidad!",pr:"feh-LEES nah-bee-DAHD",en:"Merry Christmas!"},{es:"el árbol de Navidad",pr:"el AHR-bol",en:"Christmas tree"},{es:"el regalo",pr:"el reh-GAH-loh",en:"gift / present"},{es:"las luces",pr:"lahs LOO-sehs",en:"lights"},{es:"la piñata",pr:"lah peen-YAH-tah",en:"piñata"},{es:"el villancico",pr:"el bee-yahn-SEE-koh",en:"Christmas carol"},{es:"la cena navideña",pr:"lah SEH-nah",en:"Christmas dinner"},{es:"decorar",pr:"deh-koh-RAHR",en:"to decorate"},{es:"abrir regalos",pr:"ah-BREER reh-GAH-lohs",en:"to open gifts"}],[{es:"las posadas",pr:"lahs poh-SAH-dahs",en:"Las Posadas"},{es:"peregrinos",pr:"peh-reh-GREE-nohs",en:"pilgrims (Mary & Joseph)"},{es:"la posada",pr:"lah poh-SAH-dah",en:"inn / lodging"},{es:"la vela",pr:"lah BEH-lah",en:"candle"},{es:"el aguinaldo",pr:"el ah-ghee-NAHL-doh",en:"Christmas gift / treat bag"},{es:"cantar",pr:"kahn-TAHR",en:"to sing (review)"},{es:"pedir posada",pr:"peh-DEER poh-SAH-dah",en:"to ask for shelter"},{es:"la procesión",pr:"lah proh-seh-SYOHN",en:"procession"},{es:"nueve noches",pr:"NWEH-beh NOH-chehs",en:"nine nights"},{es:"juntos",pr:"HOON-tohs",en:"together"}],[{es:"los Reyes Magos",pr:"lohs REH-yehs MAH-gohs",en:"Three Kings / Wise Men"},{es:"el seis de enero",pr:"el says deh eh-NEH-roh",en:"January 6th (Three Kings Day)"},{es:"dejar los zapatos",pr:"deh-HAHR lohs sah-PAH-tohs",en:"to leave out your shoes"},{es:"la Rosca de Reyes",pr:"lah ROHS-kah",en:"Three Kings bread"},{es:"el año nuevo",pr:"el AHN-yoh NWEH-boh",en:"new year"},{es:"¡Próspero Año Nuevo!",pr:"PROHS-peh-roh",en:"Happy New Year!"},{es:"los fuegos artificiales",pr:"lohs FWEH-gohs",en:"fireworks"},{es:"el brindis",pr:"el BREEN-dees",en:"toast / cheers"},{es:"la medianoche" ses American kids — it's a great cultural revelation","The New Year toast can be saved and used at actual New Year's!"],["THIS IS THE MOMENT. Year 1 is complete.","The showcase is the culmination of a full year of beautiful work","Print the certificate. Frame it. Make it feel BIG — because it is."]].flat().slice(0,3)},wed:{review:[["la Navidad","el regalo","vamos a","decorar","el villancico"],["las posadas","peregrinos","nueve noches","juntos","la piñata"],["los Reyes Magos","el año nuevo","¡Próspero Año Nuevo!","la medianoche","con amor"],["aprendí","mejoré","¡Lo logré!","¡Felicidades!","el próximo nivel"]][i],vocab:[[{es:"la Nochebuena",pr:"lah noh-cheh-BWEH-nah",en:"Christmas Eve"},{es:"la Nochevieja",pr:"lah noh-cheh-BYEH-hah",en:"New Year's Eve"},{es:"el nacimiento",pr:"el nah-see-MYEN-toh",en:"nativity scene"},{es:"reunirse",pr:"reh-oo-NEER-seh",en:"to get together"},{es:"¡Que lo pasen bien!",pr:"",en:"Have a great time!"}],[{es:"el espíritu navideño",pr:"el ehs-PEE-ree-too",en:"Christmas spirit"},{es:"la generosidad",pr:"lah heh-neh-roh-see-DAHD",en:"generosity"},{es:"dar",pr:"dahr",en:"to give"},{es:"recibir",pr:"reh-see-BEER",en:"to receive"},{es:"¡Es la temporada!",pr:"",en:"It's the season!"}],[{es:"el brindis final",pr:"",en:"the final toast"},{es:"el año que comienza",pr:"",en:"the year that begins"},{es:"comenzar",pr:"koh-mehn-SAHR",en:"to begin / start"},{es:"los deseos",pr:"lohs deh-SEH-ohs",en:"wishes"},{es:"¡Que se cumplan tus sueños!",pr:"",en:"May your dreams come true!"}],[{es:"el vocabulario",pr:"",en:"vocabulary"},{es:"la gramática",pr:"",en:"grammar"},{es:"la conversación",pr:"",en:"conversation"},{es:"la cultura",pr:"",en:"culture"},{es:"¡Hablas español!",pr:"AH-blahs ehs-pahn-YOHL",en:"You speak Spanish!"}]][i],grammar:{title:["Christmas Eve & Holiday Vocabulary","The Spirit of Giving","New Year Wishes","Year 1 Complete — You Speak Spanish!"][i],rule:["Christmas Eve vocabulary and holiday reunion phrases.","Use 'dar' and 'recibir' to talk a function setMode(m){

function render(){
  const month = DATA[curMonth];
  const week = month.weeks[curWeek];
  const main = document.getElementById('main-content');
  updateDayTabs();

  // Month hero
  const hero = `<div class="month-hero ${month.color}">
    <div class="mh-bg">${month.emoji}</div>
    <div class="mh-label">Week ${curWeek+1} of 4</div>
    <div class="mh-title">${month.label}</div>
    <div class="mh-sub">📍 ${month.theme}</div>
    <div class="mh-tags">${month.tags.map(t=>`<span class="mh-tag">${t}</span>`).join('')}</div>
  </div>`;

  if(curDay==='mon' || curDay==='wed'){
    const dayData = week[curDay];
    if(!dayData){ main.innerHTML=hero+`<p style="text-align:center;color:var(--muted);padding:2rem;">Content coming soon!</p>`; return; }
    main.innerHTML = hero + renderTutorDay(dayData, curDay);
    if (dayData && dayData.vocab && dayData.vocab.length) {
      ifcInit(dayData.vocab);
    }
  } else {
    const dayData = week.ind;
    if(!dayData){ main.innerHTML=hero+`<p style="text-align:center;color:var(--muted);padding:2rem;">Content coming soon!</p>`; return; }
    main.innerHTML = hero + renderIndDay(dayData);
  }
}

// WORKBOOK

function useChip(chip, word){
  if(chip.classList.contains('used')) return;
  const inputs = document.querySelectorAll('.wb-input');
  for(let inp of inputs){
    if(!inp.value){
      inp.value = word;
      chip.classList.add('used');
      break;
    }
  }
}
function checkWorkbook(){
  const inputs = document.querySelectorAll('.wb-input');
  let correct=0, total=inputs.length;
  inputs.forEach(inp=>{
    const ans = (inp.dataset.answer||'').toLowerCase().trim();
    const val = inp.value.toLowerCase().trim();
    const isOpen = ans.includes('open') || ans.includes('write') || ans.includes('any');
    if(isOpen || val === ans || ans.includes(val)){
      inp.style.borderColor='var(--green)'; correct++;
    } else {
      inp.style.borderColor='var(--coral)';
    }
  });
  const r = document.getElementById('wb-result');
  r.className='wb-result show '+(correct===total?'good':'bad');
  r.textContent = correct===total ? `✅ ¡Perfecto! ${correct}/${total} correct! Excelente trabajo!` : `${correct}/${total} correct — review the ones in red and try again!`;
}
function clearWorkbook(){
  document.querySelectorAll('.wb-input').forEach(i=>{i.value='';i.style.borderColor='';});
  document.querySelectorAll('.wb-chip').forEach(c=>c.classList.remove('used'));
  const r=document.getElementById('wb-result');
  if(r){r.className='wb-result';r.textContent='';}
}

function getVocab(month, weekIdx, day){
  const week = DATA[month].weeks[weekIdx];
  if(!week) return [];
  if(day==='both'){
    return [...(week.mon?.vocab||[]), ...(week.wed?.vocab||[])];
  }
  return week[day]?.vocab || [];
}

function openGame(type, month, weekIdx, day){
  const vocab = getVocab(month, weekIdx, day);
  if(!vocab.length){ alert('No vocabulary found for this session!'); return; }
  gmVocab = shuffle([...vocab]);
  gmType = type;
  document.getElementById('gmodal').style.display='block';
  if(type==='flashcard') renderFC();
  else if(type==='quiz') renderQuiz();
  else if(type==='match') renderMatch();
}
function closeGame(){ document.getElementById('gmodal').style.display='none'; }

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

// Flashcard
function renderFC(){
  gmIdx=0; gmFlipped=false;
  const gc=document.getElementById('gm-content');
  gc.innerHTML=`
    <div class="gm-h">🃏 Flashcards</div>
    <div class="gm-sh">Tap card to flip • ${gmVocab.length} words</div>
    <div class="fc-prog"><div class="fc-prog-fill" id="fc-pf" style="width:0%"></div></div>

    <div id="fc-wrap" onclick="fcFlip()">
      <div id="fc-inner">
        <div class="fc-side fc-front"><div class="fc-lbl">Spanish</div><div class="fc-word" id="fc-es"></div><div class="fc-sub" id="fc-pr"></div></div>
        <div class="fc-side fc-back"><div class="fc-lbl">English</div><div class="fc-word" id="fc-en"></div></div>
      </div>
    </div>
    <div class="fc-ctrl">
      <button class="fc-nav" onclick="fcNav(-1)">← Prev</button>
      <span class="fc-count" id="fc-cnt">1/${gmVocab.length}</span>
      <button class="fc-nav" onclick="fcNav(1)">Next →</button>
    </div>`;
  fcUpdate();
}
function fcUpdate(){
  const c=gmVocab[gmIdx];
  document.getElementById('fc-es').textContent=c.es;
  document.getElementById('fc-pr').textContent=c.pr||'';
  document.getElementById('fc-en').textContent=c.en;
  document.getElementById('fc-cnt').textContent=`${gmIdx+1}/${gmVocab.length}`;
  document.getElementById('fc-pf').style.width=((gmIdx+1)/gmVocab.length*100)+'%';
  const el=document.getElementById('fc-inner');
  if(el){el.classList.remove('flip');gmFlipped=false;}
}
function fcFlip(){ document.getElementById('fc-inner').classList.toggle('flip'); gmFlipped=!gmFlipped; }
function fcNav(d){ gmIdx=(gmIdx+d+gmVocab.length)%gmVocab.length; fcUpdate(); }

// Quiz
function renderQuiz(){
  gmIdx=0; gmScore=0; gmAnswered=false;
  showQ();
}
function showQ(){
  if(gmIdx>=gmVocab.length){ showQDone(); return; }
  gmAnswered=false;
  const cur=gmVocab[gmIdx];
  const wrongs=shuffle(gmVocab.filter((_,i)=>i!==gmIdx)).slice(0,3);
  const opts=shuffle([cur,...wrongs]);
  const askES=Math.random()>0.5;
  const gc=document.getElementById('gm-content');
  gc.innerHTML=`
    <div class="gm-h">🧠 Quiz Me</div>
    <div class="gm-sh">Question ${gmIdx+1} of ${gmVocab.length}</div>
    <div class="quiz-q">${askES?cur.es:cur.en}</div>
    <div class="quiz-opts">${opts.map(o=>`<button class="quiz-o" onclick="pickQ(this,'${o===cur?'correct':'wrong'}','${askES?o.en.replace(/'/g,"\\'"):o.es.replace(/'/g,"\\'")}','${(askES?cur.en:cur.es).replace(/'/g,"\\'")}')">${askES?o.en:o.es}</button>`).join('')}</div>
    <div class="quiz-fb" id="quiz-fb"></div>
    <button class="quiz-next" id="quiz-next" onclick="nextQ()">Next →</button>
    <div class="quiz-bar"><span>⭐ Score: <b id="q-sc">${gmScore}</b></span><span>${gmIdx+1}/${gmVocab.length}</span></div>`;
}
function pickQ(btn,result,chosen,correct){
  if(gmAnswered)return;
  gmAnswered=true;
  document.querySelectorAll('.quiz-o').forEach(b=>b.classList.add('done'));
  if(result==='correct'){ btn.classList.add('correct'); gmScore++; document.getElementById('quiz-fb').innerHTML='✅ <span style="color:var(--green)">¡Correcto! ¡Muy bien!</span>'; }
  else { btn.classList.add('wrong'); document.getElementById('quiz-fb').innerHTML=`❌ <span style="color:var(--coral)">The answer was: <b>${correct}</b></span>`; }
  document.getElementById('q-sc').textContent=gmScore;
  document.getElementById('quiz-next').style.display='block';
}
function nextQ(){ gmIdx++; showQ(); }
function showQDone(){
  const pct=Math.round(gmScore/gmVocab.length*100);
  const e=pct===100?'🏆':pct>=70?'⭐':'💪';
  const m=pct===100?'¡Perfecto! Perfect score!':pct>=70?'¡Muy bien! Great job!':'Keep practicing — you\'ve got this!';
  document.getElementById('gm-content').innerHTML=`<div class="gm-done"><div class="trophy">${e}</div><h3>${m}</h3><p>Score: <b>${gmScore}/${gmVocab.length}</b> (${pct}%)</p><div class="gm-done-btns"><button class="gm-again" onclick="renderQuiz()">🔄 Try Again</button><button class="gm-other" onclick="closeGame()">Done</button></div></div>`;
}

// Match
function renderMatch(){
  const pairs=shuffle(gmVocab).slice(0,6);
  matchPairs=pairs; matchSel=[]; matchSolved=[]; matchMoves=0;
  const tiles=shuffle([...pairs.map((p,i)=>({id:i,side:'es',text:p.es,pi:i})),...pairs.map((p,i)=>({id:i+pairs.length,side:'en',text:p.en,pi:i}))]);
  document.getElementById('gm-content').innerHTML=`
    <div class="gm-h">🔗 Match It</div>
    <div class="gm-sh">Match Spanish → English • 6 pairs</div>
    <div class="match-info"><span>✅ <b id="mt-sol">0</b>/6 matched</span><span>🎯 Moves: <b id="mt-mv">0</b></span></div>
    <div id="match-grid">${tiles.map(t=>`<div class="mt-tile" data-id="${t.id}" data-pi="${t.pi}" data-side="${t.side}" onclick="mtClick(this)">${t.text}</div>`).join('')}</div>
    <p style="font-size:0.72rem;color:var(--muted);text-align:center;margin-top:0.5rem;">Match each Spanish word to its English meaning</p>`;
}
function mtClick(el){
  if(el.classList.contains('mt-solved')||el.classList.contains('mt-sel'))return;
  if(matchSel.length===2)return;
  el.classList.add('mt-sel'); matchSel.push(el);
  if(matchSel.length===2){
    matchMoves++; document.getElementById('mt-mv').textContent=matchMoves;
    const[a,b]=matchSel;
    if(a.dataset.pi===b.dataset.pi&&a.dataset.side!==b.dataset.side){
      setTimeout(()=>{
        a.classList.remove('mt-sel');a.classList.add('mt-solved');
        b.classList.remove('mt-sel');b.classList.add('mt-solved');
        matchSolved.push(a.dataset.pi);
        document.getElementById('mt-sol').textContent=matchSolved.length;
        matchSel=[];
        if(matchSolved.length===matchPairs.length){
          setTimeout(()=>{
            document.getElementById('gm-content').innerHTML=`<div class="gm-done"><div class="trophy">🏆</div><h3>¡Excelente! All matched!</h3><p>Completed in <b>${matchMoves} moves</b>. ${matchMoves<=8?'⭐ Amazing memory!':'👏 Great work!'}</p><div class="gm-done-btns"><button class="gm-again" onclick="renderMatch()">🔄 Play Again</button><button class="gm-other" onclick="closeGame()">Done</button></div></div>`;
          },500);
        }
      },350);
    } else {
      setTimeout(()=>{
        a.classList.remove('mt-sel');a.classList.add('mt-shake');
        b.classList.remove('mt-sel');b.classList.add('mt-shake');
        setTimeout(()=>{a.classList.remove('mt-shake');b.classList.remove('mt-shake');},400);
        matchSel=[];
      },500);
    }
  }
}

// Init



// ── INLINE FLIP CARDS ──
var ifcIdx = 0;
var ifcVocab = [];

function ifcInit(vocab) {
  ifcVocab = vocab && vocab.length ? vocab.slice() : [];
  ifcIdx   = 0;
  ifcRender();
}

function ifcRender() {
  var card = document.getElementById('ifc-card');
  if (!card || !ifcVocab.length) return;
  var w = ifcVocab[ifcIdx];
  document.getElementById('ifc-en').textContent    = w.en || '';
  document.getElementById('ifc-es').textContent    = w.es || '';
  document.getElementById('ifc-pr').textContent    = w.pr || '';
  document.getElementById('ifc-count').textContent = (ifcIdx + 1) + '/' + ifcVocab.length;
  var fill = document.getElementById('ifc-fill');
  if (fill) fill.style.width = ((ifcIdx + 1) / ifcVocab.length * 100) + '%';
  var prev = document.getElementById('ifc-prev');
  var next = document.getElementById('ifc-next');
  if (prev) prev.disabled = (ifcIdx === 0);
  if (next) next.disabled = (ifcIdx === ifcVocab.length - 1);
  card.classList.remove('flipped');
}

function ifcFlip() {
  var card = document.getElementById('ifc-card');
  if (card) card.classList.toggle('flipped');
}

function ifcNav(dir) {
  ifcIdx = Math.max(0, Math.min(ifcVocab.length - 1, ifcIdx + dir));
  ifcRender();
}

// ═══════════════════════════════════════════════
// CONFIG — change these PINs before deploying
// ═══════════════════════════════════════════════
const PINS = {
  student: '0110',   // <- his PIN (use his iPad passcode)
  parent:  '1010',   // <- mom's PIN
  tutor:   '0229',   // <- your PIN
};

// ═══════════════════════════════════════════════
// AUTH STATE
// ═══════════════════════════════════════════════
let curRole = null;
let pinRole = '';
let pinBuf  = '';

// ── role selection ──
function selectRole(role) {
  pinRole = role;
  pinBuf  = '';
  document.getElementById('role-select').style.display = 'none';
  document.getElementById('pin-screen').style.display  = 'block';
  document.getElementById('pin-err').textContent = '';
  const hints = { student:'Enter your PIN', parent:'Enter your PIN', tutor:'Enter your PIN' };
  document.getElementById('pin-label').textContent = hints[role];
  buildPinDots();
  buildPinPad();
}

function backToRoles() {
  pinBuf = '';
  document.getElementById('pin-screen').style.display  = 'none';
  document.getElementById('role-select').style.display = 'block';
}

// ── dots ──
function buildPinDots() {
  const len = PINS[pinRole].length;
  const el = document.getElementById('pin-dots');
  el.innerHTML = '';
  for (let i = 0; i < len; i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot';
    d.id = 'pd' + i;
    el.appendChild(d);
  }
}

function refreshDots(err) {
  const len = PINS[pinRole].length;
  for (let i = 0; i < len; i++) {
    const d = document.getElementById('pd' + i);
    if (!d) continue;
    d.className = 'pin-dot' + (err ? ' err' : (i < pinBuf.length ? ' on' : ''));
  }
}

// ── keypad ──
function buildPinPad() {
  const el = document.getElementById('pin-pad');
  el.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  keys.forEach(k => {
    const b = document.createElement('button');
    b.className = 'pk' + (k === '' ? ' ghost' : '');
    b.textContent = k;
    if (k === '') { /* spacer */ }
    else if (k === '⌫') {
      b.onclick = () => {
        pinBuf = pinBuf.slice(0, -1);
        refreshDots(false);
        document.getElementById('pin-err').textContent = '';
      };
    } else {
      b.onclick = () => tapPin(k);
    }
    el.appendChild(b);
  });
}

function tapPin(digit) {
  if (pinBuf.length >= PINS[pinRole].length) return;
  pinBuf += digit;
  refreshDots(false);
  if (pinBuf.length === PINS[pinRole].length) {
    setTimeout(submitPin, 150);
  }
}

function submitPin() {
  if (pinBuf === PINS[pinRole]) {
    curRole = pinRole;
    document.getElementById('auth-screen').style.display = 'none';
    enterApp();
  } else {
    refreshDots(true);
    document.getElementById('pin-err').textContent = 'Wrong PIN — try again';
    setTimeout(() => {
      pinBuf = '';
      refreshDots(false);
      document.getElementById('pin-err').textContent = '';
    }, 900);
  }
}

// ── enter app ──
function enterApp() {
  if (curRole === 'parent') {
    loadParentDash();
    return;
  }

  // Show main shell
  document.getElementById('app-shell').style.display = 'block';
  document.getElementById('tb-extras').style.display = 'flex';

  if (curRole === 'student') {
    // Student: solo view only
    document.getElementById('mode-toggle').style.display  = 'none';
    document.getElementById('work-btn').style.display     = 'none';
    document.getElementById('tab-mon').style.display      = 'none';
    document.getElementById('tab-wed').style.display      = 'none';
    curMode = 'student';
    curDay  = 'ind';
    document.getElementById('tab-ind').classList.add('active');
  } else {
    // Tutor: full access
    document.getElementById('mode-toggle').style.display = 'flex';
    document.getElementById('work-btn').style.display    = 'inline-block';
  }
  render();
}

function signOut() {
  curRole = null;
  pinBuf  = '';
  document.getElementById('app-shell').style.display    = 'none';
  document.getElementById('parent-dash').style.display  = 'none';
  document.getElementById('work-panel').style.display   = 'none';
  document.getElementById('tb-extras').style.display    = 'none';
  document.getElementById('auth-screen').style.display  = 'flex';
  document.getElementById('role-select').style.display  = 'block';
  document.getElementById('pin-screen').style.display   = 'none';
}

// ═══════════════════════════════════════════════
// STORAGE HELPERS
// ═══════════════════════════════════════════════
async function dbSet(key, val) {
  try { await window.storage.set(key, JSON.stringify(val), true); } catch(e) {}
}
async function dbGet(key) {
  try {
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════
// SAVE WORKBOOK SESSION
// ═══════════════════════════════════════════════
async function saveSession(answers, score, total) {
  const key = curMonth + '_w' + (curWeek + 1);
  const entry = {
    key,
    monthLabel: DATA[curMonth].label,
    week: curWeek + 1,
    ts: new Date().toISOString(),
    score,
    total,
    answers,
  };
  let log = await dbGet('solo_log') || [];
  log = log.filter(e => e.key !== key); // replace same session
  log.unshift(entry);
  if (log.length > 300) log = log.slice(0, 300);
  await dbSet('solo_log', log);
}

// ═══════════════════════════════════════════════
// WORKBOOK — override checkWorkbook to also save
// ═══════════════════════════════════════════════
function checkWorkbook() {
  const inputs = document.querySelectorAll('.wb-input');
  let correct = 0;
  const total  = inputs.length;
  const answers = [];

  inputs.forEach((inp, i) => {
    const expected = (inp.dataset.answer || '').toLowerCase().trim();
    const val      = inp.value.trim();
    const valLow   = val.toLowerCase();
    const isOpen   = expected.includes('open') || expected.includes('write') || expected.includes('any');
    const isOk     = isOpen || valLow === expected || expected.includes(valLow);
    if (isOk) { correct++; inp.style.borderColor = 'var(--green)'; }
    else        { inp.style.borderColor = 'var(--coral)'; }

    const wb    = DATA[curMonth]?.weeks[curWeek]?.ind?.workbook;
    const qText = (wb?.items?.[i]?.label || ('Q' + (i + 1))).replace(/^\d+\.\s*/, '');
    answers.push({ q: qText, a: val, ok: isOk });
  });

  const r = document.getElementById('wb-result');
  r.className = 'wb-result show ' + (correct === total ? 'good' : 'bad');
  r.textContent = correct === total
    ? '✅ ¡Perfecto! ' + correct + '/' + total + ' correct! Excelente trabajo!'
    : correct + '/' + total + ' correct — review the ones in red and try again!';

  // Save if student
  if (curRole === 'student') {
    saveSession(answers, correct, total);
  }
}

// ═══════════════════════════════════════════════
// PARENT DASHBOARD
// ═══════════════════════════════════════════════
async function loadParentDash() {
  document.getElementById('parent-dash').style.display = 'block';
  document.getElementById('tb-extras').style.display   = 'flex';
  document.getElementById('work-btn').style.display    = 'none';

  const log = await dbGet('solo_log') || [];

  // Stats
  const now     = Date.now();
  const weekMs  = 7 * 24 * 60 * 60 * 1000;
  const weekCnt = log.filter(e => now - new Date(e.ts).getTime() < weekMs).length;

  // Streak: consecutive days counting backwards from today
  const days = new Set(log.map(e => e.ts.slice(0, 10)));
  let streak = 0;
  let d = new Date();
  while (streak < 365) {
    if (days.has(d.toISOString().slice(0, 10))) {
      streak++;
      d = new Date(d.getTime() - 86400000);
    } else { break; }
  }

  document.getElementById('pd-total').textContent  = log.length;
  document.getElementById('pd-week').textContent   = weekCnt;
  document.getElementById('pd-streak').textContent = streak;

  const list = document.getElementById('pd-list');
  if (!log.length) {
    list.innerHTML = '<div class="pd-empty">No sessions yet.<br>Once he completes a Solo Day and hits "Check Answers," it will show up here.</div>';
    return;
  }

  list.innerHTML = log.slice(0, 40).map(e => {
    const dt   = new Date(e.ts);
    const date = dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const time = dt.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    return '<div class="pd-item">' +
      '<span class="pd-item-icon">🌟</span>' +
      '<div class="pd-item-body">' +
        '<div class="pd-item-name">' + e.monthLabel + ' — Week ' + e.week + ' Solo Day</div>' +
        '<div class="pd-item-time">' + date + ' at ' + time + '</div>' +
      '</div>' +
      '<div class="pd-item-score">' + e.score + '/' + e.total + '</div>' +
    '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════
// TUTOR WORK PANEL
// ═══════════════════════════════════════════════
async function openWorkPanel() {
  document.getElementById('work-panel').style.display = 'block';
  const log = await dbGet('solo_log') || [];
  const list = document.getElementById('wp-list');

  if (!log.length) {
    list.innerHTML = '<div class="wp-empty">📭 No solo sessions saved yet.<br><br>Once he completes a workbook and taps "Check Answers," his responses will appear here — sorted newest first.</div>';
    return;
  }

  list.innerHTML = log.map(e => {
    const dt   = new Date(e.ts);
    const when = dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    const qas  = (e.answers || []).map(a =>
      '<div class="wp-q">' + a.q + '</div>' +
      '<div class="wp-a ' + (a.ok ? 'ok' : 'no') + '">' + (a.a || '(blank)') + '</div>'
    ).join('');
    return '<div class="wp-session">' +
      '<div class="wp-sh">' +
        '<div class="wp-sname">🌟 ' + e.monthLabel + ' — Week ' + e.week + ' Solo Day</div>' +
        '<div class="wp-stime">' + when + '</div>' +
      '</div>' +
      '<span class="wp-score-badge">Score: ' + e.score + '/' + e.total + '</span>' +
      '<div class="wp-qa">' + qas + '</div>' +
    '</div>';
  }).join('');
}

function closeWorkPanel() {
  document.getElementById('work-panel').style.display = 'none';
}
